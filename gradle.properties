# Evitar que el compilador se quede sin memoria RAM asignándole 2GB de espacio de heap de forma estricta
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m

# Desactivar el demonio persistente en background ya que en GitHub Actions es un entorno de un solo uso
org.gradle.daemon=false

# Habilitar soporte para AndroidX
android.useAndroidX=true
android.enableJetifier=true
