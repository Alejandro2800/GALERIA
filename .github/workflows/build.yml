name: Generar APK de Galería One UI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      - name: Descargar Código Fuente
        uses: actions/checkout@v4

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Usar la acción nativa oficial de Gradle para evitar scripts apt-get rotos o desactualizados
      - name: Configurar Gradle Nativo de Alto Rendimiento (v8.5)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      # Fuerza la compatibilidad de AndroidX directamente en caliente para evitar errores de AAR Metadata
      - name: Forzar Propiedades de AndroidX
        run: |
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: Compilar APK de Depuración (Debug APK de forma directa)
        run: gradle assembleDebug

      - name: Guardar y Enviar APK compilado
        uses: actions/upload-artifact@v4
        with:
          name: Samsung-Gallery-Clone-APK
          path: app/build/outputs/apk/debug/app-debug.apk
