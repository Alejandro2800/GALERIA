name: Generar APK de Galería One UI 

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      - name: Descargar Código Fuente
        uses: actions/checkout@v4

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Conceder permisos de ejecución a Gradle
        run: chmod +x gradlew

      - name: Compilar APK de Depuración (Debug APK)
        run: ./gradlew assembleDebug

      - name: Guardar y Enviar APK compilado
        uses: actions/upload-artifact@v4
        with:
          name: Samsung-Gallery-Clone-APK
          path: app/build/outputs/apk/debug/app-debug.apk
